<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Training</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0f0d;--bg2:#161714;--bg3:#1e1f1c;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#e8e6df;--text2:#8a8880;--text3:#4a4845;
  --accent:#c8f060;--accent2:#8bb840;
  --legs:#f0b060;--push:#60b4f0;--pull:#a06cf0;--hyrox:#f06080;--cf:#60e0c0;
  --r:10px;--r2:14px;--tab-h:68px;
  --sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh;}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
#content::-webkit-scrollbar{display:none;}

/* LANG BANNER */
#lang-banner{
  display:flex;align-items:center;justify-content:flex-end;
  padding:10px 16px 0;gap:6px;
}
.lang-btn{
  background:none;border:1px solid var(--border);border-radius:999px;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:.05em;text-transform:uppercase;color:var(--text3);
  padding:5px 12px;cursor:pointer;transition:all .2s;
  -webkit-user-select:none;user-select:none;
}
.lang-btn:active{opacity:.7;}
.lang-btn.active{background:rgba(200,240,96,0.1);border-color:rgba(200,240,96,0.3);color:var(--accent);}

/* BOTTOM NAV */
#bottom-nav{
  flex-shrink:0;display:flex;align-items:stretch;
  background:rgba(14,15,13,0.97);border-top:1px solid var(--border);
  padding-bottom:var(--sab);height:calc(var(--tab-h) + var(--sab));
  position:relative;z-index:100;
}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:none;padding:8px 2px;min-width:0;-webkit-user-select:none;user-select:none;}
.bn:active{opacity:.6;}
.bn-icon{font-size:22px;line-height:1;transition:transform .2s;}
.bn-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);transition:color .2s;white-space:nowrap;}
.bn.active .bn-label{color:var(--accent);}
.bn.active .bn-icon{transform:translateY(-2px);}

/* PAGES */
.page{display:none;padding:16px 16px 32px;max-width:680px;margin:0 auto;}
.page.active{display:block;}

/* TYPE */
.page-title{font-family:'Syne',sans-serif;font-size:clamp(26px,7vw,40px);font-weight:800;line-height:1.05;letter-spacing:-.02em;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:22px;font-weight:300;}
.c-accent{color:var(--accent);}
.section-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:22px 0 10px;}
.section-label:first-child{margin-top:0;}

/* SESSION TABS */
.stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.stab{background:none;border:1px solid var(--border);border-radius:999px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);padding:7px 14px;transition:all .2s;-webkit-user-select:none;user-select:none;}
.stab:active{opacity:.7;}
.stab.active{color:#0a0a0a;border-color:transparent;}
.stab.legs.active{background:var(--legs);}
.stab.push.active{background:var(--push);}
.stab.pull.active{background:var(--pull);}
.stab.hyrox.active{background:var(--hyrox);}
.spanel{display:none;}
.spanel.active{display:block;}

/* SPEED TOGGLE */
.speed-toggle{display:flex;gap:6px;margin-bottom:14px;}
.speed-btn{flex:1;padding:8px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);transition:all .2s;text-align:center;-webkit-user-select:none;user-select:none;}
.speed-btn.active{background:rgba(200,240,96,0.1);border-color:rgba(200,240,96,0.3);color:var(--accent);}

/* EX ROWS */
.ex-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:start;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;margin-bottom:6px;}
.ex-name{font-size:14px;font-weight:500;color:var(--text);}
.ex-cue{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5;}
.badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;white-space:nowrap;align-self:start;}
.b-sets{background:rgba(200,240,96,0.06);color:var(--accent2);border:1px solid rgba(200,240,96,0.12);}
.b-reps{background:rgba(255,255,255,0.04);color:var(--text2);border:1px solid var(--border);}
.b-time{background:rgba(96,224,192,0.08);color:var(--cf);border:1px solid rgba(96,224,192,0.14);}
.b-each{background:rgba(160,108,240,0.08);color:var(--pull);border:1px solid rgba(160,108,240,0.14);}

.phase-div{display:flex;align-items:center;gap:8px;margin:18px 0 8px;}
.phase-div span{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.phase-div::after{content:'';flex:1;height:1px;background:var(--border);}

.total-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(200,240,96,0.05);border:1px solid rgba(200,240,96,0.1);border-radius:var(--r);padding:10px 12px;margin-top:12px;}
.total-bar span:first-child{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
.total-bar span:last-child{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--accent);}
.tip{border-left:2px solid var(--accent);background:rgba(200,240,96,0.04);border-radius:0 var(--r) var(--r) 0;padding:10px 12px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6;}
.warn{border-left:2px solid var(--hyrox);background:rgba(240,96,128,0.05);border-radius:0 var(--r) var(--r) 0;padding:10px 12px;margin-bottom:12px;font-size:12px;color:rgba(240,96,128,0.85);line-height:1.6;}

/* WEEK */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px;}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:9px 3px;text-align:center;}
.day-name{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.day-icon{font-size:15px;display:block;margin-bottom:4px;}
.day-tag{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;display:block;margin-bottom:2px;}
.day-sub{font-size:9px;color:var(--text3);line-height:1.3;}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 10px;}
.stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent);letter-spacing:-.03em;line-height:1;margin-bottom:3px;}
.stat-label{font-size:11px;color:var(--text2);}

/* PROG */
.prog-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;margin-bottom:8px;}
.prog-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px;}
.prog-body{font-size:12px;color:var(--text2);line-height:1.6;}

/* RECOVERY */
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:380px){.rec-grid{grid-template-columns:1fr;}}
.rec-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 13px;}
.rec-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.rec-body{font-size:11px;color:var(--text2);line-height:1.6;}
.prio{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:2px 6px;border-radius:999px;}
.p-hi{background:rgba(240,96,128,0.12);color:var(--hyrox);border:1px solid rgba(240,96,128,0.2);}
.p-med{background:rgba(240,176,96,0.12);color:var(--legs);border:1px solid rgba(240,176,96,0.2);}
.p-lo{background:rgba(96,224,192,0.08);color:var(--cf);border:1px solid rgba(96,224,192,0.15);}

/* FLOW */
.flow-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin:12px 0 20px;}
.flow-pill{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:5px 10px;border-radius:999px;letter-spacing:.04em;text-transform:uppercase;border:1px solid;}

/* PROGRESS PAGE */
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.prog-header h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.btn-small{background:rgba(200,240,96,0.1);border:1px solid rgba(200,240,96,0.25);border-radius:var(--r);padding:7px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);cursor:pointer;letter-spacing:.04em;-webkit-user-select:none;user-select:none;}
.btn-primary{background:var(--accent);border:none;border-radius:var(--r);padding:12px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:#0a0a08;cursor:pointer;letter-spacing:.04em;width:100%;margin-top:10px;-webkit-user-select:none;user-select:none;}
.btn-primary:active{opacity:.8;}
.log-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:5px;}
select,input[type=number]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 10px;-webkit-appearance:none;appearance:none;outline:none;}
select:focus,input:focus{border-color:var(--border2);}
.log-list{display:flex;flex-direction:column;gap:6px;}
.log-entry{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;display:flex;justify-content:space-between;align-items:start;gap:8px;}
.log-entry-left .log-ex{font-size:13px;font-weight:500;color:var(--text);}
.log-entry-left .log-meta{font-size:11px;color:var(--text2);margin-top:3px;}
.log-entry-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.log-weight{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--accent);}
.log-vol{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
.log-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 2px;-webkit-user-select:none;user-select:none;}
.log-del:active{color:var(--hyrox);}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-top:10px;overflow:hidden;}
.chart-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
canvas{width:100%!important;height:140px!important;}
.empty-state{text-align:center;padding:28px 16px;color:var(--text3);font-size:13px;line-height:1.7;}
.empty-icon{font-size:28px;display:block;margin-bottom:8px;}
</style>
</head>
<body>
<div id="app">
<div id="content">

<!-- LANG BANNER -->
<div id="lang-banner">
  <button class="lang-btn active" id="lb-fr" ontouchend="setLang(event,'fr')">🇫🇷 FR</button>
  <button class="lang-btn" id="lb-en" ontouchend="setLang(event,'en')">🇬🇧 EN</button>
</div>

<!-- ===== SCHEDULE ===== -->
<div id="page-schedule" class="page active">
  <p class="page-title" data-t="sched.title.line1"></p>
  <p class="page-sub" data-t="sched.sub"></p>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val">5</div><div class="stat-label" data-t="sched.stat1"></div></div>
    <div class="stat-card"><div class="stat-val">4d</div><div class="stat-label" data-t="sched.stat2"></div></div>
    <div class="stat-card"><div class="stat-val">~81kg</div><div class="stat-label" data-t="sched.stat3"></div></div>
  </div>
  <div class="week-grid" id="week-grid"></div>
  <div class="section-label" data-t="sched.logic.title"></div>
  <div class="flow-row" id="flow-row"></div>
  <div class="section-label" data-t="sched.prog.title"></div>
  <div id="sched-prog-cards"></div>
</div>

<!-- ===== WORKOUTS ===== -->
<div id="page-workouts" class="page">
  <p class="page-title" data-t="wo.title"></p>
  <p class="page-sub" data-t="wo.sub"></p>
  <div class="stabs">
    <button class="stab legs active" ontouchend="stab(event,'wo','legs','legs')" data-t="tab.legs"></button>
    <button class="stab push" ontouchend="stab(event,'wo','push','push')">Push</button>
    <button class="stab pull" ontouchend="stab(event,'wo','pull','pull')">Pull</button>
  </div>
  <div id="wo-legs" class="spanel active"></div>
  <div id="wo-push" class="spanel"></div>
  <div id="wo-pull" class="spanel"></div>
</div>

<!-- ===== WARMUPS ===== -->
<div id="page-warmups" class="page">
  <p class="page-title" data-t="wu.title"></p>
  <p class="page-sub" data-t="wu.sub"></p>
  <div class="stabs">
    <button class="stab legs active" ontouchend="stab(event,'wu','legs','legs')" data-t="tab.legs"></button>
    <button class="stab push" ontouchend="stab(event,'wu','push','push')">Push</button>
    <button class="stab pull" ontouchend="stab(event,'wu','pull','pull')">Pull</button>
    <button class="stab hyrox" ontouchend="stab(event,'wu','hyrox','hyrox')">Hyrox</button>
  </div>
  <div id="wu-legs" class="spanel active"></div>
  <div id="wu-push" class="spanel"></div>
  <div id="wu-pull" class="spanel"></div>
  <div id="wu-hyrox" class="spanel"></div>
</div>

<!-- ===== COOLDOWNS ===== -->
<div id="page-cooldowns" class="page">
  <p class="page-title" data-t="cd.title"></p>
  <p class="page-sub" data-t="cd.sub"></p>
  <div class="stabs">
    <button class="stab legs active" ontouchend="stab(event,'cd','legs','legs')" data-t="tab.legs"></button>
    <button class="stab push" ontouchend="stab(event,'cd','push','push')">Push</button>
    <button class="stab pull" ontouchend="stab(event,'cd','pull','pull')">Pull</button>
    <button class="stab hyrox" ontouchend="stab(event,'cd','hyrox','hyrox')">Hyrox</button>
  </div>
  <div id="cd-legs" class="spanel active"></div>
  <div id="cd-push" class="spanel"></div>
  <div id="cd-pull" class="spanel"></div>
  <div id="cd-hyrox" class="spanel"></div>
</div>

<!-- ===== RECOVERY ===== -->
<div id="page-recovery" class="page">
  <p class="page-title" data-t="rec.title"></p>
  <p class="page-sub" data-t="rec.sub"></p>
  <div id="rec-body"></div>
</div>

<!-- ===== PROGRESS ===== -->
<div id="page-progress" class="page">
  <p class="page-title" data-t="prog.title"></p>
  <p class="page-sub" data-t="prog.sub"></p>
  <div class="log-form">
    <div class="form-row">
      <div><label data-t="prog.session"></label><select id="log-session" onchange="updateExercises()"></select></div>
      <div><label data-t="prog.exercise"></label><select id="log-exercise"></select></div>
    </div>
    <div class="form-row three">
      <div><label data-t="prog.sets"></label><input type="number" id="log-sets" value="4" min="1" max="10"></div>
      <div><label data-t="prog.reps"></label><input type="number" id="log-reps" value="8" min="1" max="30"></div>
      <div><label data-t="prog.weight"></label><input type="number" id="log-weight" placeholder="kg" min="0" step="0.5"></div>
    </div>
    <button class="btn-primary" id="log-add-btn" ontouchend="addLog(event)"></button>
  </div>
  <div id="chart-section" style="display:none">
    <div class="chart-wrap"><div class="chart-title" id="chart-label"></div><canvas id="prog-chart"></canvas></div>
  </div>
  <div style="margin-top:14px">
    <div class="prog-header">
      <h3 data-t="prog.history"></h3>
      <button class="btn-small" id="clear-btn" ontouchend="clearLogs(event)"></button>
    </div>
    <div id="log-list" class="log-list"></div>
  </div>
</div>

</div><!-- content -->

<!-- BOTTOM NAV -->
<div id="bottom-nav">
  <button class="bn active" id="bn-schedule" ontouchend="nav(event,'schedule')">
    <span class="bn-icon">📅</span><span class="bn-label" data-t="nav.schedule"></span>
  </button>
  <button class="bn" id="bn-workouts" ontouchend="nav(event,'workouts')">
    <span class="bn-icon">💪</span><span class="bn-label" data-t="nav.workouts"></span>
  </button>
  <button class="bn" id="bn-warmups" ontouchend="nav(event,'warmups')">
    <span class="bn-icon">🔥</span><span class="bn-label" data-t="nav.warmups"></span>
  </button>
  <button class="bn" id="bn-cooldowns" ontouchend="nav(event,'cooldowns')">
    <span class="bn-icon">❄️</span><span class="bn-label" data-t="nav.cooldowns"></span>
  </button>
  <button class="bn" id="bn-progress" ontouchend="nav(event,'progress')">
    <span class="bn-icon">📈</span><span class="bn-label" data-t="nav.progress"></span>
  </button>
</div>
</div><!-- app -->

  return `<div class="ex-row"><div><div class="ex-name">${item.n}</div><div class="ex-cue">${item.c}</div></div><div class="badge ${bclass}">${item.v}</div></div>`;
}

function speedPanel(prefix, session, expressKey, fullKey, durExpress, durFull, tip, warnKey) {
  const w = warnKey ? `<div class="warn">${t(warnKey)}</div>` : '';
  const ex = DATA[prefix][session][lang].express.map(exRow).join('');
  const fu = DATA[prefix][session][lang].full.map(exRow).join('');
  return `
    <div class="speed-toggle">
      <button class="speed-btn active" ontouchend="speedToggle(event,this,'${expressKey}','${fullKey}')">${t('btn.express')}</button>
      <button class="speed-btn" ontouchend="speedToggle(event,this,'${fullKey}','${expressKey}')">${t('btn.full')}</button>
    </div>
    <div id="${expressKey}">${w}${ex}<div class="total-bar"><span>${t('total.duration')}</span><span>${durExpress}</span></div></div>
    <div id="${fullKey}" style="display:none">${fu}<div class="total-bar"><span>${t('total.duration')}</span><span>${durFull}</span></div></div>`;
}

// ─────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────
function renderAll() {
  document.querySelectorAll('[data-t]').forEach(el => {
    const k = el.getAttribute('data-t');
    const v = t(k);
    if (k === 'sched.title.line1') {
      const parts = v.split('\n');
      el.innerHTML = parts[0] + '<br><span class="c-accent">' + parts[1] + '</span>';
    } else { el.textContent = v; }
  });

  const days=t('days'),tags=t('day.tags'),subs=t('day.subs');
  const icons=['🦵','💪','🔥','🔙','🏃','🚶','🍳'];
  const colors=[['--legs','rgba(240,176,96,0.3)','rgba(240,176,96,0.07)'],['--push','rgba(96,180,240,0.3)','rgba(96,180,240,0.07)'],['--cf','rgba(96,224,192,0.3)','rgba(96,224,192,0.07)'],['--pull','rgba(160,108,240,0.3)','rgba(160,108,240,0.07)'],['--hyrox','rgba(240,96,128,0.3)','rgba(240,96,128,0.07)'],['',,''],['',,'']];
  document.getElementById('week-grid').innerHTML=days.map((d,i)=>`
    <div class="day-card" style="${colors[i][1]?'border-color:'+colors[i][1]+';background:'+colors[i][2]+';':''}">
      <div class="day-name">${d}</div><span class="day-icon">${icons[i]}</span>
      <span class="day-tag" style="${colors[i][0]?'color:var('+colors[i][0]+')':'color:var(--text3)'}">${tags[i]}</span>
      <span class="day-sub">${subs[i]}</span>
    </div>`).join('');

  const flowLabels=t('flow.labels');
  const fc=[['--legs','rgba(240,176,96,0.3)','rgba(240,176,96,0.08)'],['--push','rgba(96,180,240,0.3)','rgba(96,180,240,0.08)'],['--cf','rgba(96,224,192,0.3)','rgba(96,224,192,0.08)'],['--pull','rgba(160,108,240,0.3)','rgba(160,108,240,0.08)'],['--hyrox','rgba(240,96,128,0.3)','rgba(240,96,128,0.08)']];
  let fr_html='';
  flowLabels.forEach((lbl,i)=>{if(i>0)fr_html+='<span style="color:var(--text3)">→</span>';fr_html+=`<span class="flow-pill" style="color:var(${fc[i][0]});border-color:${fc[i][1]};background:${fc[i][2]}">${lbl}</span>`;});
  document.getElementById('flow-row').innerHTML=fr_html;

  document.getElementById('sched-prog-cards').innerHTML=DATA.schedProgCards[lang].map(c=>`<div class="prog-card"><div class="prog-title">${c.t}</div><div class="prog-body">${c.b}</div></div>`).join('');

  ['legs','push','pull'].forEach(s=>{
    const d=DATA.workouts[s][lang];
    const restKey=s==='legs'?'rest.compound':'rest.upper';
    const sets=s==='legs'?23:21;
    document.getElementById('wo-'+s).innerHTML=
      `<div class="phase-div"><span>${t('phase.compound')}</span></div>`+
      d.compound.map(e=>`<div class="ex-row"><div><div class="ex-name">${e.n}</div><div class="ex-cue">${e.c}</div></div><div class="badge b-sets">${e.s}</div><div class="badge b-reps">${e.r}</div></div>`).join('')+
      `<div class="phase-div"><span>${t('phase.iso')}</span></div>`+
      d.iso.map(e=>`<div class="ex-row"><div><div class="ex-name">${e.n}</div><div class="ex-cue">${e.c}</div></div><div class="badge b-sets">${e.s}</div><div class="badge b-reps">${e.r}</div></div>`).join('')+
      `<div class="total-bar"><span>${t(restKey)}</span><span>${sets} ${lang==='fr'?'séries':'sets'}</span></div>`;
  });

  ['legs','push','pull','hyrox'].forEach(s=>{
    const wk=s==='hyrox'?'warn.hyrox.wu':null;
    document.getElementById('wu-'+s).innerHTML=speedPanel('warmups',s,'wu-'+s+'-express','wu-'+s+'-full',t('dur.express.'+s+'.wu'),t('dur.full.'+s+'.wu'),null,wk);
  });

  ['legs','push','pull','hyrox'].forEach(s=>{
    const wk=s==='hyrox'?'warn.hyrox.cd':null;
    document.getElementById('cd-'+s).innerHTML=speedPanel('cooldowns',s,'cd-'+s+'-express','cd-'+s+'-full',t('dur.express.'+s+'.cd'),t('dur.full.'+s+'.cd'),null,wk);
  });

  const rd=DATA.recovery[lang];
  let rhtml=`<div class="section-label">${rd.labels.daily}</div>`;
  rd.daily.forEach(c=>{rhtml+=`<div class="prog-card" style="margin-bottom:8px"><div class="prog-title">${c.icon} ${c.title} <span class="prio ${c.prio}" style="margin-left:4px">${c.ptxt}</span></div><div class="prog-body">${c.body}</div></div>`;});
  rhtml+=`<div class="section-label">${rd.labels.sat}</div>`;
  rd.sat.forEach(c=>{rhtml+=`<div class="prog-card" style="margin-bottom:8px"><div class="prog-title">${c.icon} ${c.title}</div><div class="prog-body">${c.body}</div></div>`;});
  rhtml+=`<div class="section-label">${rd.labels.sun}</div>`;
  rd.sun.forEach(c=>{rhtml+=`<div class="prog-card" style="margin-bottom:8px"><div class="prog-title">${c.icon} ${c.title}</div><div class="prog-body">${c.body}</div></div>`;});
  rhtml+=`<div class="section-label">${rd.labels.tools}</div><div class="rec-grid">`;
  rd.tools.forEach(c=>{rhtml+=`<div class="rec-card"><div class="rec-title"><span class="prio ${c.prio}">${c.ptxt}</span> ${c.title}</div><div class="rec-body">${c.body}</div></div>`;});
  rhtml+='</div>';
  document.getElementById('rec-body').innerHTML=rhtml;

  const sessionSel=document.getElementById('log-session');
  const prevSession=sessionSel.value||'legs';
  sessionSel.innerHTML=Object.entries(SESSION_LABELS[lang]).map(([k,v])=>`<option value="${k}" ${k===prevSession?'selected':''}>${v}</option>`).join('');
  updateExercises();
  document.getElementById('log-add-btn').textContent=t('btn.add');
  document.getElementById('clear-btn').textContent=t('btn.clear');
  renderLogs();
}

function setLang(e,l){e.preventDefault();lang=l;localStorage.setItem('lang',l);document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));document.getElementById('lb-'+l).classList.add('active');renderAll();}
function nav(e,id){e.preventDefault();document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.bn').forEach(b=>b.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');document.getElementById('bn-'+id).classList.add('active');document.getElementById('content').scrollTo({top:0,behavior:'instant'});}
function stab(e,prefix,id,color){e.preventDefault();const btn=e.currentTarget;const page=btn.closest('.page');page.querySelectorAll('[id^="'+prefix+'-"]').forEach(p=>p.classList.remove('active'));document.getElementById(prefix+'-'+id).classList.add('active');btn.closest('.stabs').querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function speedToggle(e,btn,showId,hideId){e.preventDefault();btn.closest('.speed-toggle').querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById(showId).style.display='block';document.getElementById(hideId).style.display='none';}

const STORE_KEY='training_logs_v1';
function loadLogs(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'[]');}catch(e){return[];}}
function saveLogs(logs){try{localStorage.setItem(STORE_KEY,JSON.stringify(logs));}catch(e){}}
function updateExercises(){const s=document.getElementById('log-session').value;const sel=document.getElementById('log-exercise');sel.innerHTML=(EXERCISES[lang][s]||[]).map(e=>`<option value="${e}">${e}</option>`).join('');}
function addLog(e){e.preventDefault();const session=document.getElementById('log-session').value;const exercise=document.getElementById('log-exercise').value;const sets=parseInt(document.getElementById('log-sets').value)||1;const reps=parseInt(document.getElementById('log-reps').value)||1;const weight=parseFloat(document.getElementById('log-weight').value)||0;if(!weight){document.getElementById('log-weight').focus();return;}const logs=loadLogs();logs.unshift({id:Date.now(),date:new Date().toLocaleDateString(lang==='fr'?'fr-FR':'en-GB',{day:'2-digit',month:'2-digit'}),session,exercise,sets,reps,weight});saveLogs(logs);renderLogs();document.getElementById('log-weight').value='';}
function deleteLog(id){saveLogs(loadLogs().filter(l=>l.id!==id));renderLogs();}
function clearLogs(e){e.preventDefault();if(confirm(t('confirm.clear'))){saveLogs([]);renderLogs();}}
function renderLogs(){const logs=loadLogs();const list=document.getElementById('log-list');if(!logs.length){list.innerHTML=`<div class="empty-state"><span class="empty-icon">📊</span>${t('empty')}</div>`;document.getElementById('chart-section').style.display='none';return;}list.innerHTML=logs.map(l=>`<div class="log-entry"><div class="log-entry-left"><div class="log-ex">${l.exercise}</div><div class="log-meta">${l.date} · ${SESSION_LABELS[lang][l.session]||l.session} · ${l.sets}×${l.reps}</div></div><div class="log-entry-right"><span class="log-weight">${l.weight}kg</span><span class="log-vol">${(l.sets*l.reps*l.weight).toFixed(0)}kg ${t('vol')}</span><button class="log-del" ontouchend="(function(e){e.preventDefault();deleteLog(${l.id);})(event)">✕</button></div></div>`).join('');renderChart(logs);}
function renderChart(logs){const section=document.getElementById('chart-section');const counts={};logs.forEach(l=>{counts[l.exercise]=(counts[l.exercise]||0)+1;});const top=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];if(!top){section.style.display='none';return;}const exLogs=[...logs].filter(l=>l.exercise===top[0]).reverse().slice(-10);if(exLogs.length<2){section.style.display='none';return;}section.style.display='block';document.getElementById('chart-label').textContent=(lang==='fr'?'Progression — ':'Progress — ')+top[0];const canvas=document.getElementById('prog-chart');const ctx=canvas.getContext('2d');const dpr=window.devicePixelRatio||1;const W=canvas.offsetWidth||300,H=140;canvas.width=W*dpr;canvas.height=H*dpr;ctx.scale(dpr,dpr);const weights=exLogs.map(l=>l.weight);const mn=Math.min(...weights)*0.9,mx=Math.max(...weights)*1.05;const pad={l:38,r:12,t:12,b:26};const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;ctx.clearRect(0,0,W,H);ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;for(let i=0;i<=4;i++){const y=pad.t+ch-(i/4)*ch;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();}const pts=exLogs.map((l,i)=>({x:pad.l+(i/(exLogs.length-1))*cw,y:pad.t+ch-((l.weight-mn)/(mx-mn))*ch}));const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);grad.addColorStop(0,'rgba(200,240,96,0.18)');grad.addColorStop(1,'rgba(200,240,96,0)');ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,pad.t+ch);ctx.lineTo(pts[0].x,pad.t+ch);ctx.closePath();ctx.fillStyle=grad;ctx.fill();ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.strokeStyle='#c8f060';ctx.lineWidth=2;ctx.stroke();pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fillStyle='#c8f060';ctx.fill();});ctx.fillStyle='rgba(138,136,128,0.8)';ctx.font='10px DM Mono,monospace';ctx.textAlign='right';[mn,(mn+mx)/2,mx].forEach(v=>{const y=pad.t+ch-((v-mn)/(mx-mn))*ch;ctx.fillText(Math.round(v)+'kg',pad.l-4,y+3.5);});ctx.textAlign='center';exLogs.forEach((l,i)=>{if(i===0||i===exLogs.length-1||(exLogs.length>4&&i===Math.floor(exLogs.length/2))){ctx.fillText(l.date,pts[i].x,H-4);}});}

document.getElementById('lb-'+lang).classList.add('active');
if(lang==='en')document.getElementById('lb-fr').classList.remove('active');
renderAll();
</script>
